<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="HYPR Knowledge Hub — links, ferramentas e dashboards internos do time HYPR." />
<meta name="theme-color" content="#07090f" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f4f5f7" media="(prefers-color-scheme: light)" />
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<title>HYPR Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ─── TOKENS ─────────────────────────── */
:root {
  --bg:         #07090f;
  --surface:    rgba(255,255,255,0.045);
  --surf-h:     rgba(255,255,255,0.075);
  --border:     rgba(255,255,255,0.08);
  --bord-h:     rgba(255,255,255,0.16);
  --accent:     #11a1cb;
  --accent2:    #3bbfe0;
  --fav:        #f5b43c;
  --text:       #e8ecf4;
  --text-2:     rgba(232,236,244,0.7);
  --muted:      rgba(232,236,244,0.62);
  --r:          13px;
  --r-sm:       9px;
  --r-lg:       20px;
  /* spacing scale */
  --sp-1: 4px;  --sp-2: 8px;   --sp-3: 12px;
  --sp-4: 16px; --sp-5: 20px;  --sp-6: 24px;
  --sp-8: 32px; --sp-10: 48px; --sp-12: 56px;
  /* layout */
  --topbar-h:   64px;
  --page-max:   1280px;
  --page-pad:   clamp(24px, 5vw, 56px);
  --card-gap:   16px;
  /* theme-specific */
  --login-card-bg: rgba(7,9,15,.65);
  --topbar-bg: rgba(7,9,15,0.78);
  --search-bg: rgba(7,9,15,0.72);
  --tooltip-bg: #0d111e;
  --mesh-opacity: 1;
  --grid-opacity: .022;
  --orb-opacity: 1;
  --btn-google-bg: rgba(255,255,255,.065);
  --btn-google-hover: rgba(255,255,255,.11);
  --invert-logo: 0;
}

/* ─── LIGHT THEME ────────────────────── */
[data-theme="light"] {
  --bg:         #f4f5f7;
  --surface:    rgba(0,0,0,0.04);
  --surf-h:     rgba(0,0,0,0.07);
  --border:     rgba(0,0,0,0.1);
  --bord-h:     rgba(0,0,0,0.18);
  --accent:     #0d8aab;
  --accent2:    #0a7a99;
  --fav:        #a86a00;
  --text:       #1b262f;
  --text-2:     rgba(27,38,47,0.72);
  --muted:      rgba(27,38,47,0.66);
  --login-card-bg: rgba(255,255,255,.82);
  --topbar-bg: rgba(244,245,247,0.85);
  --search-bg: rgba(244,245,247,0.82);
  --tooltip-bg: #ffffff;
  --mesh-opacity: .3;
  --grid-opacity: .035;
  --orb-opacity: .4;
  --btn-google-bg: rgba(0,0,0,.05);
  --btn-google-hover: rgba(0,0,0,.09);
  --invert-logo: 1;
}

/* ─── LOGIN: always dark ─────────────── */
#login-screen { color: #e8ecf4; }
#login-screen .login-card {
  background: rgba(7,9,15,.65) !important;
  border-color: rgba(255,255,255,.08) !important;
  box-shadow: 0 40px 100px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
#login-screen .login-title { color: rgba(232,236,244,0.7); }
#login-screen .login-title em { color: #11a1cb; }
#login-screen .login-sub { color: rgba(232,236,244,0.4); }
#login-screen .btn-google {
  background: rgba(255,255,255,.065) !important;
  border-color: rgba(255,255,255,.16) !important;
  color: #e8ecf4 !important;
}
#login-screen .btn-google:hover { background: rgba(255,255,255,.11) !important; }
#login-screen .login-note { color: rgba(232,236,244,0.4); }
#login-screen .login-error { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.25); color: #fca5a5; }
#login-screen .login-logo img { filter: invert(0) !important; }

/* ─── RESET ──────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Urbanist', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
img { display: block; max-width: 100%; }

/* ─── FOCUS ──────────────────────────── */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--r-sm);
}
.link-card .card-hit:focus-visible, .quick-card:focus-visible, .trending-card:focus-visible {
  outline-offset: -2px;
  border-radius: var(--r);
}
/* Remove default outline when not keyboard-navigating */
:focus:not(:focus-visible) { outline: none; }

/* ─── SR-ONLY (visually hidden, accessible) ── */
.sr-only {
  position: absolute !important;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ─── BACKGROUND ─────────────────────── */
.bg-mesh {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: var(--mesh-opacity);
  background:
    radial-gradient(ellipse 70% 50% at 15% -5%, rgba(17,161,203,.1) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 105%, rgba(99,102,241,.07) 0%, transparent 55%);
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: var(--grid-opacity);
  background-image:
    linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);
  background-size: 44px 44px;
}
.orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; animation: drift 22s ease-in-out infinite; opacity: var(--orb-opacity); }
.orb-1 { width: 480px; height: 480px; background: rgba(17,161,203,.055); top: -120px; left: -80px; }
.orb-2 { width: 380px; height: 380px; background: rgba(99,102,241,.045); bottom: -80px; right: -60px; animation-delay: -8s; }
.orb-3 { width: 280px; height: 280px; background: rgba(6,182,212,.035); top: 45%; left: 62%; animation-delay: -15s; }
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(24px,-16px) scale(1.04); }
  66%      { transform: translate(-16px,24px) scale(.96); }
}

/* ─── THEME TOGGLE ───────────────────── */
.theme-toggle {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: all .2s; flex-shrink: 0;
  color: var(--muted);
}
.theme-toggle:hover { border-color: var(--bord-h); color: var(--text); background: var(--surf-h); }
.theme-toggle svg { width: 16px; height: 16px; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="light"] .theme-toggle .icon-sun { display: block; }
[data-theme="light"] .theme-toggle .icon-moon { display: none; }
/* Logo inversion for light theme */
.topbar-logo img { filter: invert(var(--invert-logo)); transition: filter .2s; }
.login-logo img { filter: invert(var(--invert-logo)); transition: filter .2s; }

/* ─── LAYOUT ROOT ────────────────────── */
#app { position: relative; z-index: 1; }

/* ─── LOADING ────────────────────────── */
#loading-screen {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.loader {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--accent);
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── LOGIN SCREEN ───────────────────── */
#login-screen {
  display: none;
  align-items: center; justify-content: center;
  min-height: 100vh;
  padding: var(--sp-6);
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: url('login-bg.webp') center/cover no-repeat;
  z-index: 0;
}
.login-card {
  width: 100%; max-width: 400px;
  position: relative; z-index: 2;
  background: var(--login-card-bg);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 22px;
  padding: var(--sp-12) clamp(28px, 8vw, 44px);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  box-shadow: 0 40px 100px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  animation: fadeUp .5s ease both;
  text-align: center;
}
.login-logo {
  display: flex; justify-content: center;
  margin-bottom: var(--sp-8);
}
.login-title {
  font-size: clamp(28px, 6vw, 36px);
  font-weight: 500; letter-spacing: -.025em;
  margin-bottom: var(--sp-2);
  color: var(--text-2);
}
.login-title em {
  color: var(--accent); font-style: normal; font-weight: 600;
}
.login-sub {
  font-size: 14px; color: var(--muted);
  margin-bottom: var(--sp-8); line-height: 1.65;
}
.btn-google {
  width: 100%; padding: 13px var(--sp-5);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: var(--btn-google-bg); border: 1px solid var(--bord-h);
  border-radius: var(--r); font-size: 15px; font-weight: 500;
  color: var(--text); transition: all .2s ease; cursor: pointer;
}
.btn-google:hover {
  background: var(--btn-google-hover);
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(0,0,0,.3);
}
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.login-note { font-size: 12px; color: var(--muted); margin-top: var(--sp-5); opacity: .55; }
.login-error {
  display: none; margin-top: var(--sp-4);
  padding: 11px var(--sp-4);
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
  border-radius: var(--r-sm); font-size: 13px; color: #fca5a5;
  animation: fadeUp .3s ease both;
}

/* ─── HUB SCREEN ─────────────────────── */
#hub-screen { display: none; }

/* ════════════════════════════════════════
   HEADER (brand + user — no search)
   ════════════════════════════════════════ */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--topbar-bg);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--border);
}
.topbar-inner {
  max-width: var(--page-max);
  margin: 0 auto;
  height: var(--topbar-h);
  padding: 0 var(--page-pad);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-6);
}
/* Brand ── */
.topbar-logo {
  display: flex; align-items: center; gap: 14px;
  flex-shrink: 0; text-decoration: none;
}
.topbar-logo img {
  height: 26px; width: auto; opacity: .92;
}
.topbar-logo-divider {
  width: 1px; height: 24px; background: var(--border); flex-shrink: 0;
}
.topbar-logo-text {
  font-size: 26px; font-weight: 400; letter-spacing: -.01em;
  color: var(--text-2); white-space: nowrap;
}
.topbar-logo-text em {
  color: var(--accent); font-style: normal; font-weight: 500;
}
/* Light mode: titles use full --text color */
[data-theme="light"] .topbar-logo-text { color: var(--text); }
/* User ── */
.topbar-user {
  display: flex; align-items: center; gap: var(--sp-3);
  flex-shrink: 0;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; overflow: hidden; color: var(--accent2);
  flex-shrink: 0;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.btn-logout {
  height: 32px; padding: 0 14px;
  border: 1px solid var(--border); border-radius: 100px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  display: flex; align-items: center; gap: 7px;
  transition: all .2s; white-space: nowrap;
}
.btn-logout:hover { border-color: var(--bord-h); color: var(--text); }
.btn-logout svg { width: 13px; height: 13px; }
.btn-admin {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid rgba(129,140,248,.4);
  background: rgba(99,102,241,.1);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; color: #a5b4fc;
}
.btn-admin:hover { border-color: rgba(129,140,248,.7); color: #c7d2fe; background: rgba(99,102,241,.18); box-shadow: 0 0 12px rgba(99,102,241,.25); }
.btn-admin svg { width: 15px; height: 15px; }

/* ════════════════════════════════════════
   SEARCH BAR (below header, sticky)
   ════════════════════════════════════════ */
.search-bar {
  position: sticky; top: var(--topbar-h); z-index: 90;
  background: var(--search-bg);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  padding: 6px 0;
}
.search-bar-inner {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 0 var(--page-pad);
  position: relative;
}
.search-wrap {
  position: relative;
  width: 100%;
}
.search-input {
  width: 100%;
  height: 36px;
  padding: 0 var(--sp-5) 0 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-family: 'Urbanist', sans-serif;
  font-size: 14px; color: var(--text);
  outline: none; transition: background .2s, border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus {
  background: var(--surf-h);
  border-color: rgba(17,161,203,.35);
  box-shadow: 0 0 0 3px rgba(17,161,203,.08);
}
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted); pointer-events: none;
}

/* ════════════════════════════════════════
   MAIN CONTENT
   ════════════════════════════════════════ */
.hub-main {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: var(--sp-10) var(--page-pad) 96px;
}

/* ─── SECTION LABEL ──────────────────── */
.section-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: var(--sp-6);
  display: flex; align-items: center; gap: var(--sp-3);
  user-select: none; cursor: pointer;
  transition: color .2s, margin-bottom .35s cubic-bezier(.4, 0, .2, 1);
  /* button-tag neutralization (renders identically to prior div) */
  width: 100%; text-align: left; padding: 0;
  background: none; border: 0; appearance: none; -webkit-appearance: none;
  font-family: inherit;
}
.section-label:hover { color: var(--text-2); }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Collapsible toggle */
.section-toggle {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid transparent;
  color: var(--muted); cursor: pointer;
  transition: all .2s; flex-shrink: 0;
}
.section-toggle:hover {
  background: var(--surface); border-color: var(--border); color: var(--text);
}
.section-toggle svg {
  width: 12px; height: 12px;
  transition: transform .3s cubic-bezier(.4, 0, .2, 1);
}
.section-toggle.collapsed svg {
  transform: rotate(-90deg);
}
@media (max-width: 640px) {
  .section-toggle { width: 36px; height: 36px; }
}

/* Collapsible content wrapper */
.section-collapse {
  display: grid;
  grid-template-rows: 1fr;
  opacity: 1;
  transition: grid-template-rows .35s cubic-bezier(.4, 0, .2, 1),
              opacity .25s ease;
}
.section-collapse.collapsed {
  grid-template-rows: 0fr;
  opacity: 0;
}
.section-collapse > div {
  overflow: visible;
}
.section-collapse.collapsed > div {
  overflow: hidden;
}
/* Shrink parent section margin when collapsed */
.fav-section:has(.section-collapse.collapsed),
.quick-section:has(.section-collapse.collapsed),
.trending-section:has(.section-collapse.collapsed) {
  margin-bottom: var(--sp-2);
}
.fav-section:has(.section-collapse.collapsed) .section-label,
.quick-section:has(.section-collapse.collapsed) .section-label,
.trending-section:has(.section-collapse.collapsed) .section-label {
  margin-bottom: 0;
}

/* ─── SHORTCUTS ZONE (elevated surface) ─── */
.shortcuts-zone {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-6) var(--sp-6) var(--sp-2);
  margin-bottom: var(--sp-8);
  animation: fadeUp .4s ease .08s both;
}
/* Remove individual section bottom margin — zone padding handles it */
.shortcuts-zone .fav-section { margin-bottom: var(--sp-5); }
.shortcuts-zone .fav-section.no-data { margin-bottom: 0; }
.shortcuts-zone .quick-section { margin-bottom: var(--sp-5); }
.shortcuts-zone .trending-section { margin-bottom: var(--sp-4); }
.shortcuts-zone .trending-section.no-data { margin-bottom: 0; }
/* When both collapsed, tighten zone */
.shortcuts-zone:has(.quick-section:has(.section-collapse.collapsed)):has(.trending-section.no-data),
.shortcuts-zone:has(.quick-section:has(.section-collapse.collapsed)):has(.trending-section:has(.section-collapse.collapsed)) {
  padding-bottom: var(--sp-4);
}
/* Adjust section-label inside zone */
.shortcuts-zone .section-label { margin-bottom: var(--sp-4); }

/* ─── QUICK ACCESS ───────────────────── */
.quick-section {
  margin-bottom: var(--sp-10);
  animation: fadeUp .45s ease .1s both;
  transition: margin-bottom .35s cubic-bezier(.4, 0, .2, 1);
}
/* Search-driven hide: animated */
.quick-section.search-hidden {
  max-height: 0; margin-bottom: 0; overflow: hidden;
  opacity: 0; pointer-events: none;
  transition: max-height .3s ease, opacity .2s ease, margin-bottom .3s ease;
}
.quick-section:not(.search-hidden) {
  max-height: 400px;
  transition: max-height .4s ease, opacity .3s ease .05s, margin-bottom .3s ease;
}
.quick-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--sp-3);
}
.quick-card {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: 14px 16px;
  background: rgba(17,161,203,.08);
  border: 1px solid rgba(17,161,203,.18);
  border-radius: var(--r);
  font-size: 14px; font-weight: 500;
  transition: all .18s ease; cursor: pointer;
  min-width: 0;
  position: relative;
}
.quick-card:hover {
  background: rgba(17,161,203,.15);
  border-color: rgba(17,161,203,.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(17,161,203,.15);
}
.quick-card .qicon {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(17,161,203,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.quick-card span {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0;
}

/* ─── TRENDING SECTION ────────────────── */
.trending-section {
  margin-bottom: var(--sp-10);
  animation: fadeUp .45s ease .12s both;
  transition: margin-bottom .35s cubic-bezier(.4, 0, .2, 1);
}
.trending-section.search-hidden {
  max-height: 0; margin-bottom: 0; overflow: hidden;
  opacity: 0; pointer-events: none;
  transition: max-height .3s ease, opacity .2s ease, margin-bottom .3s ease;
}
.trending-section:not(.search-hidden) {
  max-height: 600px;
  transition: max-height .4s ease, opacity .3s ease .05s, margin-bottom .3s ease;
}
.trending-section.no-data { display: none; }
.trending-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--sp-3);
}
.trending-card {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: 14px 16px;
  background: rgba(99,102,241,.08);
  border: 1px solid rgba(99,102,241,.18);
  border-radius: var(--r);
  font-size: 14px; font-weight: 500;
  transition: all .18s ease; cursor: pointer;
  min-width: 0;
  position: relative;
  overflow: hidden;
}
.trending-card:hover {
  background: rgba(99,102,241,.15);
  border-color: rgba(99,102,241,.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(99,102,241,.15);
}
.trending-card .ticon {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(99,102,241,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.trending-card .trank {
  position: absolute; top: 6px; right: 8px;
  font-size: 10px; font-weight: 700; color: rgba(99,102,241,.5);
  line-height: 1;
}
.trending-card span {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0;
}
.trending-empty {
  font-size: 13px; color: var(--muted); font-style: italic;
  padding: var(--sp-4) 0;
}

/* ─── FAVORITES SECTION ──────────────── */
.fav-section {
  margin-bottom: var(--sp-10);
  animation: fadeUp .45s ease .09s both;
  transition: margin-bottom .35s cubic-bezier(.4, 0, .2, 1);
}
.fav-section.no-data { display: none; }
.fav-section.search-hidden {
  max-height: 0; margin-bottom: 0; overflow: hidden;
  opacity: 0; pointer-events: none;
  transition: max-height .3s ease, opacity .2s ease, margin-bottom .3s ease;
}
.fav-section:not(.search-hidden) {
  max-height: 600px;
  transition: max-height .4s ease, opacity .3s ease .05s, margin-bottom .3s ease;
}
.fav-star-lead { color: var(--fav); font-size: 12px; }
.fav-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--sp-3);
}
.fav-card-wrap { position: relative; min-width: 0; animation: favIn .32s cubic-bezier(.2,.8,.3,1) both; }
.fav-card {
  display: flex; align-items: center; gap: var(--sp-3);
  padding: 14px 40px 14px 16px;
  background: rgba(245,180,60,.09);
  border: 1px solid rgba(245,180,60,.22);
  border-radius: var(--r);
  font-size: 14px; font-weight: 500;
  transition: all .18s ease; cursor: pointer;
  min-width: 0;
}
.fav-card:hover {
  background: rgba(245,180,60,.16);
  border-color: rgba(245,180,60,.4);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245,180,60,.15);
}
.fav-card .qicon {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(245,180,60,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.fav-card span {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0;
}
.fav-card-wrap .fav-btn {
  position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
  opacity: 1;
}
@keyframes favIn {
  from { opacity: 0; transform: translateY(8px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── FAVORITE STAR BUTTON (on catalog cards) ─── */
.fav-btn {
  position: relative; z-index: 2;
  flex-shrink: 0; width: 26px; height: 26px; padding: 0; margin-top: -1px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent; cursor: pointer; border-radius: 8px;
  color: var(--muted); opacity: 0;
  transition: opacity .18s ease, color .18s ease, background .18s ease, transform .15s ease;
}
.fav-btn svg { width: 18px; height: 18px; transition: transform .15s ease; }
.fav-btn:not(.is-fav) svg { fill: none; }
.fav-btn.is-fav { color: var(--fav); opacity: 1; }
.fav-btn.is-fav svg { fill: var(--fav); stroke: var(--fav); }
.fav-btn:hover { background: rgba(245,180,60,.16); color: var(--fav); }
.link-card:hover .fav-btn,
.link-card:focus-within .fav-btn,
.fav-btn:focus-visible { opacity: 1; }
.fav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.fav-btn.just-toggled svg { animation: starPop .4s cubic-bezier(.2,.8,.3,1.5); }
@keyframes starPop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.4) rotate(-8deg); }
  100% { transform: scale(1) rotate(0); }
}
/* Touch devices: no hover, so always show the star + enlarge tap target to ~44px (WCAG 2.5.5) */
@media (hover: none) {
  .fav-btn { opacity: 1; }
  .link-card .fav-btn::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 44px; height: 44px; transform: translate(-50%, -50%);
  }
}
/* Respect reduced-motion preference */
@media (prefers-reduced-motion: reduce) {
  .fav-card-wrap, .fav-btn.just-toggled svg { animation: none; }
  .fav-card:hover { transform: none; }
}

/* ════════════════════════════════════════
   CONTROLS BAR (view switcher + filters inline)
   ════════════════════════════════════════ */
.controls-bar {
  position: sticky;
  top: calc(var(--topbar-h) + 48px);
  z-index: 80;
  background: var(--search-bg);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
}
.controls-bar-inner {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 0 var(--page-pad);
  display: flex; align-items: center; gap: var(--sp-4);
  flex-wrap: wrap;
  animation: fadeUp .45s ease .12s both;
}
.controls-sep {
  width: 1px; height: 24px;
  background: var(--border); flex-shrink: 0;
}

/* Toggle all groups button */
.toggle-all-btn {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; flex-shrink: 0;
  transition: all .2s;
  margin-left: auto;
}
.toggle-all-btn:hover {
  border-color: var(--bord-h); color: var(--text);
  background: var(--surf-h);
}
.toggle-all-btn svg { width: 14px; height: 14px; }

/* ─── MOBILE FILTER SYSTEM ──────────── */
/* Trigger button: hidden on desktop, shown on mobile via media query */
.mobile-filter-trigger {
  display: none; /* shown via @media */
  align-items: center; gap: 6px;
  height: 32px; padding: 0 12px;
  border-radius: 100px; font-size: 13px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  transition: all .18s; white-space: nowrap; flex-shrink: 0;
}
.mobile-filter-trigger:hover {
  border-color: var(--bord-h); color: var(--text);
}
.mobile-filter-trigger.has-filter {
  background: rgba(17,161,203,.1);
  border-color: rgba(17,161,203,.35);
  color: var(--accent);
}
.mobile-filter-trigger svg { width: 14px; height: 14px; }
.mobile-filter-badge {
  min-width: 18px; height: 18px; border-radius: 100px;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px; line-height: 1;
}

/* Overlay */
.mf-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.3); z-index: 600;
  opacity: 0; transition: opacity .25s ease;
}
.mf-overlay.open { display: block; opacity: 1; }

/* Bottom sheet */
.mf-sheet {
  display: none; position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 601;
  background: var(--tooltip-bg);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  max-height: 75vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4, 0, .2, 1);
  box-shadow: 0 -8px 40px rgba(0,0,0,.25);
}
.mf-sheet.open { display: block; transform: translateY(0); }

/* Handle bar */
.mf-handle {
  display: flex; justify-content: center;
  padding: var(--sp-3) 0 var(--sp-2);
  cursor: pointer;
  /* button-tag neutralization */
  width: 100%; background: none; border: 0;
  appearance: none; -webkit-appearance: none;
}
.mf-handle::after {
  content: '';
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--muted); opacity: .35;
}

/* Header */
.mf-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--sp-5) var(--sp-4);
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--sp-2);
}
.mf-title {
  font-size: 16px; font-weight: 700; color: var(--text);
}
.mf-clear {
  font-size: 13px; font-weight: 600; color: var(--accent);
  background: none; border: none; cursor: pointer; padding: 4px 8px;
  border-radius: 6px; transition: background .15s;
}
.mf-clear:active { background: rgba(17,161,203,.1); }

/* Body */
.mf-body { padding: var(--sp-3) var(--sp-5) var(--sp-8); }

/* Filter sections inside sheet */
.mf-section {
  margin-bottom: var(--sp-5);
}
.mf-section:last-child { margin-bottom: 0; }
.mf-section-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: var(--sp-3);
}
.mf-chips {
  display: flex; flex-wrap: wrap; gap: var(--sp-2);
}
/* Reuse .type-chip styles — chips rendered are identical */
.mf-chips .type-chip {
  height: 38px; font-size: 13px; padding: 0 14px;
}

/* ─── VIEW MODE SWITCHER (sliding pill) ─── */
.view-switcher {
  display: flex; align-items: center; gap: var(--sp-2);
  flex-shrink: 0;
}
.view-switcher-label {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
  margin-right: var(--sp-1); white-space: nowrap; flex-shrink: 0;
}
.view-switcher-group {
  display: flex; align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
  position: relative;
}
/* Sliding pill background */
.view-slider {
  position: absolute;
  top: 3px; left: 3px;
  height: calc(100% - 6px);
  border-radius: 100px;
  background: var(--accent);
  box-shadow: 0 1px 4px rgba(17,161,203,.3);
  transition: transform .32s cubic-bezier(.4, 0, .2, 1), width .32s cubic-bezier(.4, 0, .2, 1);
  pointer-events: none;
  z-index: 0;
}
.view-mode-btn {
  position: relative; z-index: 1;
  height: 26px; padding: 0 12px;
  border-radius: 100px; font-size: 12px; font-weight: 500;
  color: var(--muted); transition: color .22s; cursor: pointer;
  white-space: nowrap; border: none; background: none;
  display: flex; align-items: center; gap: 5px;
}
.view-mode-btn:hover { color: var(--text); }
.view-mode-btn.active { color: #fff; }
.view-mode-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

/* Mobile */
@media (max-width: 640px) {
  .controls-bar { top: calc(var(--topbar-h) + 52px); padding: var(--sp-2) 0; }
  .controls-bar-inner { gap: var(--sp-2); padding: 0 var(--sp-4); }
  .controls-sep { display: none; }
  /* View switcher: compact, full width */
  .view-switcher { gap: var(--sp-1); width: 100%; }
  .view-switcher-label { display: none; }
  .view-switcher-group { padding: 2px; width: 100%; justify-content: center; }
  .view-mode-btn { height: 30px; padding: 0 10px; font-size: 11px; flex: 1; justify-content: center; }
  .view-slider { top: 2px; left: 2px; height: calc(100% - 4px); }
  /* Hide desktop filter bar, show mobile trigger */
  .filter-bar { display: none !important; }
  .filter-bar-label { display: none; }
  .mobile-filter-trigger { display: flex; }
}
@media (max-width: 400px) {
  .view-mode-btn { padding: 0 8px; font-size: 10px; }
}

/* ════════════════════════════════════════
   FILTER BAR
   ════════════════════════════════════════ */
.filter-bar-label {
  font-size: 11px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
  white-space: nowrap; flex-shrink: 0;
  margin-right: var(--sp-1);
}
.filter-bar {
  display: flex; align-items: center;
  gap: var(--sp-2);
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}
/* Category pills — REMOVED: category is now a dropdown filter */

/* ─── Type filter button ─────────────── */
.type-filter-btn {
  position: relative; flex-shrink: 0;
  z-index: 501; /* garante stacking context acima de tudo */
}
.type-btn {
  height: 32px; padding: 0 12px 0 10px;
  display: flex; align-items: center; gap: 7px;
  border-radius: 100px; font-size: 14px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); transition: all .18s; cursor: pointer;
  white-space: nowrap;
}
.type-btn:hover { border-color: var(--bord-h); color: var(--text); }
.type-btn.has-filter {
  background: rgba(17,161,203,.1);
  border-color: rgba(17,161,203,.35);
  color: var(--accent);
}
.type-btn-chevron { width: 12px; height: 12px; transition: transform .2s; opacity: .7; }
.type-btn.open .type-btn-chevron { transform: rotate(180deg); }
.type-btn .filter-badge {
  min-width: 18px; height: 18px; border-radius: 100px;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px; line-height: 1;
}

/* ─── Type dropdown ──────────────────── */
.type-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0;
  min-width: 280px;
  background: var(--tooltip-bg);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-4);
  box-shadow:
    0 4px 6px -1px rgba(0,0,0,.5),
    0 20px 60px rgba(0,0,0,.7),
    0 0 0 1px rgba(0,0,0,.9); /* extra shadow to kill bleed */
  z-index: 502;
  display: none;
}
.type-dropdown.open {
  display: block;
  animation: dropIn .15s ease;
}
@keyframes dropIn {
  from { opacity: 0; transform: translateY(-4px) scale(.99); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
/* ─── Consolidated "Filtros" panel (single dropdown, 4 dimensions) ── */
.filters-dropdown {
  min-width: 300px;
  max-height: min(70vh, 560px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-dim {
  padding-top: var(--sp-3);
  margin-top: var(--sp-3);
  border-top: 1px solid var(--border);
}
.filter-dim:first-of-type {
  padding-top: 0; margin-top: 0; border-top: none;
}
.filter-dim-label {
  font-size: 10px; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: var(--sp-3);
}
.dropdown-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: var(--sp-3);
  border-bottom: 1px solid rgba(255,255,255,.07);
  margin-bottom: var(--sp-3);
}
.dropdown-header span {
  font-size: 10px; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: var(--muted);
}
.dropdown-clear {
  font-size: 11px; font-weight: 600; color: var(--accent);
  cursor: pointer; background: none; border: none; padding: 0;
  opacity: 0; pointer-events: none; transition: opacity .15s;
}
.dropdown-clear.visible { opacity: 1; pointer-events: all; }
.type-chips {
  display: flex; flex-wrap: wrap; gap: var(--sp-2);
}
.type-chip {
  display: flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 11px;
  border-radius: 100px; font-size: 12.5px; font-weight: 500;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.04);
  color: rgba(232,236,244,.6);
  cursor: pointer; transition: all .15s;
  white-space: nowrap; user-select: none;
}
.type-chip:hover {
  border-color: rgba(255,255,255,.18);
  color: var(--text);
  background: rgba(255,255,255,.07);
}
.type-chip.active { border-color: transparent; color: #fff; }
.type-chip .chip-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}

/* chip color map — single source via custom properties */
[data-type="google-sheets"]  { --chip-clr: #0f9d58; }
[data-type="google-slides"]  { --chip-clr: #f4b400; --chip-txt: #111; }
[data-type="google-docs"]    { --chip-clr: #4285f4; }
[data-type="google-drive"]   { --chip-clr: #0288d1; }
[data-type="looker-studio"]  { --chip-clr: #7c3aed; }
[data-type="typeform"]       { --chip-clr: #e74c3c; }
[data-type="hypr-tool"]      { --chip-clr: #11a1cb; }
[data-type="loom"]           { --chip-clr: #625df5; }
[data-type="other"]          { --chip-clr: #475569; }
/* category chip color map */
[data-cat="op"]  { --chip-clr: #e89b2d; }
[data-cat="da"]  { --chip-clr: #11a1cb; }
[data-cat="fe"]  { --chip-clr: #8b5cf6; }
[data-cat="rc"]  { --chip-clr: #0f9d58; }
.type-chip .chip-dot { background: var(--chip-clr, #475569); }
.type-chip.active { background: var(--chip-clr, #475569); color: var(--chip-txt, #fff); }

/* ─── Light theme: dropdown & chip overrides ── */
[data-theme="light"] .type-dropdown {
  box-shadow: 0 4px 20px rgba(0,0,0,.1), 0 0 0 1px rgba(0,0,0,.06);
}
[data-theme="light"] .dropdown-header {
  border-bottom-color: rgba(0,0,0,.08);
}
[data-theme="light"] .type-chip {
  border-color: rgba(0,0,0,.12);
  background: rgba(0,0,0,.03);
  color: rgba(27,38,47,.65);
}
[data-theme="light"] .type-chip:hover {
  border-color: rgba(0,0,0,.22);
  background: rgba(0,0,0,.06);
  color: #1b262f;
}
[data-theme="light"] .active-tag {
  background: rgba(0,0,0,.06);
  border-color: rgba(0,0,0,.12);
  color: #1b262f;
}

/* Light theme: card hover refinements */
[data-theme="light"] .link-card:hover {
  background: rgba(0,0,0,0.04);
  box-shadow: 0 8px 24px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
}
[data-theme="light"] .link-card::before {
  background: linear-gradient(90deg, transparent, rgba(0,0,0,.04), transparent);
}
[data-theme="light"] .quick-card:hover {
  box-shadow: 0 6px 20px rgba(17,161,203,.08);
}
[data-theme="light"] .trending-card:hover {
  box-shadow: 0 6px 20px rgba(99,102,241,.08);
}

/* ─── Active tags in filter bar ─────── */
.active-type-tags {
  display: flex; align-items: center; gap: var(--sp-2);
  flex-wrap: wrap;
}
.active-type-tags.dd-tags:empty { display: none; }
.active-type-tags.dd-tags {
  margin-top: var(--sp-3);
  padding-top: var(--sp-3);
  border-top: 1px solid var(--border);
}
.active-tag {
  display: flex; align-items: center; gap: 4px;
  height: 26px; padding: 0 9px;
  border-radius: 100px; font-size: 11.5px; font-weight: 600;
  color: #fff; cursor: pointer; transition: opacity .15s;
}
.active-tag[data-type="google-slides"] { color: #111; }
.active-tag:hover { opacity: .8; }
.active-tag svg { width: 9px; height: 9px; }
.active-tag[data-type] { background: var(--chip-clr, #475569); }

/* ════════════════════════════════════════
   CATEGORY SECTIONS
   ════════════════════════════════════════ */
.cat-section {
  margin-bottom: var(--sp-10);
  animation: fadeUp .45s ease both;
  transition: margin-bottom .35s cubic-bezier(.4, 0, .2, 1);
}
.cat-section.grp-collapsed { margin-bottom: var(--sp-2); }
.cat-section:nth-child(1) { animation-delay: .15s; }
.cat-section:nth-child(2) { animation-delay: .22s; }
.cat-section:nth-child(3) { animation-delay: .29s; }
.cat-section:nth-child(4) { animation-delay: .36s; }

.cat-header {
  display: flex; align-items: center; gap: var(--sp-3);
  margin-bottom: var(--sp-5);
  padding: 0 0 var(--sp-4);
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
  transition: margin-bottom .35s cubic-bezier(.4, 0, .2, 1),
              padding-bottom .35s cubic-bezier(.4, 0, .2, 1),
              border-color .25s ease;
  /* button-tag neutralization (renders identically to prior div) */
  width: 100%; text-align: left;
  background: none; appearance: none; -webkit-appearance: none;
  font-family: inherit; color: inherit;
}
.cat-header:hover .grp-toggle { background: var(--surface); border-color: var(--border); color: var(--text); }
.cat-section.grp-collapsed .cat-header { margin-bottom: 0; padding-bottom: 0; border-bottom-color: transparent; }

/* Group collapse toggle (chevron) */
.grp-toggle {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid transparent;
  color: var(--muted); flex-shrink: 0; margin-left: var(--sp-2);
  transition: all .2s;
}
@media (max-width: 640px) {
  .grp-toggle { width: 36px; height: 36px; }
}
.grp-toggle svg {
  width: 11px; height: 11px;
  transition: transform .3s cubic-bezier(.4, 0, .2, 1);
}
.cat-section.grp-collapsed .grp-toggle svg { transform: rotate(-90deg); }

/* Group content collapse */
.grp-content {
  display: grid;
  grid-template-rows: 1fr;
  opacity: 1;
  transition: grid-template-rows .35s cubic-bezier(.4, 0, .2, 1),
              opacity .25s ease;
}
.grp-content > div {
  overflow: visible;
}
.cat-section.grp-collapsed .grp-content {
  grid-template-rows: 0fr;
  opacity: 0;
}
.cat-section.grp-collapsed .grp-content > div {
  overflow: hidden;
}
.cat-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.cat-icon.op { background: rgba(99,179,237,.12); }
.cat-icon.da { background: rgba(104,211,145,.12); }
.cat-icon.fe { background: rgba(154,117,237,.12); }
.cat-icon.rc { background: rgba(246,173,85,.12); }
/* Dynamic view mode group icons */
.cat-icon.grp-type     { background: rgba(17,161,203,.12); }
.cat-icon.grp-sales    { background: rgba(59,130,246,.12); }
.cat-icon.grp-cs       { background: rgba(16,185,129,.12); }
.cat-icon.grp-product  { background: rgba(168,85,247,.12); }
.cat-icon.grp-marketing{ background: rgba(251,146,60,.12); }
.cat-icon.grp-people   { background: rgba(236,72,153,.12); }
.cat-icon.grp-everyone { background: rgba(148,163,184,.12); }
.cat-icon.grp-other    { background: rgba(148,163,184,.12); }
.cat-icon.grp-prod     { background: rgba(129,140,248,.12); }
.cat-name {
  font-size: 19px; font-weight: 700; letter-spacing: -.02em; color: var(--text);
}
.cat-count {
  font-size: 12px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 2px 9px; margin-left: auto;
}

/* ─── LINKS GRID ─────────────────────── */
.links-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--card-gap);
}

/* ─── LINK CARD ──────────────────────── */
.link-card {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 20px;
  min-height: 88px;
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  border-radius: var(--r);
  position: relative; overflow: hidden;
  transition: background .2s, border-color .2s, transform .2s, box-shadow .2s;
  cursor: pointer;
}
.link-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  opacity: 0; transition: opacity .2s; z-index: 2;
}
/* Stretched link: âncora cobre o card inteiro; controles ficam acima via z-index.
   Evita interativo aninhado (<button> dentro de <a>). */
.card-hit {
  position: absolute; inset: 0; z-index: 1;
  border-radius: inherit;
}
.link-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--bord-h);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.05);
}
.link-card:hover::before,
.link-card:focus-within::before { opacity: 1; }
.card-icon {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; flex-shrink: 0; margin-top: 1px;
}
.card-icon.op { background: rgba(99,179,237,.1); }
.card-icon.da { background: rgba(104,211,145,.1); }
.card-icon.fe { background: rgba(154,117,237,.1); }
.card-icon.rc { background: rgba(246,173,85,.1); }
.card-body { flex: 1; min-width: 0; }
.card-title {
  font-size: 14px; font-weight: 500; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-desc {
  font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4;
}
.card-teams {
  display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap;
}
.team-tag {
  font-size: 10px; font-weight: 700; letter-spacing: .03em;
  padding: 2px 7px; border-radius: 4px; line-height: 1.5;
  text-transform: uppercase;
}
.team-tag.t-sales     { background: rgba(59,130,246,.15); color: #60a5fa; }
.team-tag.t-cs        { background: rgba(16,185,129,.15); color: #34d399; }
.team-tag.t-product   { background: rgba(168,85,247,.15); color: #c084fc; }
.team-tag.t-marketing { background: rgba(251,146,60,.15); color: #fb923c; }
.team-tag.t-people    { background: rgba(236,72,153,.15); color: #f472b6; }
.team-tag.t-everyone  { background: rgba(148,163,184,.12); color: #94a3b8; }

/* Product tags — outline monochrome purple */
.product-tag {
  font-size: 9px; font-weight: 700; letter-spacing: .06em;
  padding: 1px 6px; border-radius: 4px; line-height: 1.6;
  text-transform: uppercase; background: transparent;
  border: 1px solid rgba(129,140,248,.35); color: rgba(129,140,248,.7);
}

/* Click counter */
.card-clicks {
  position: absolute; bottom: 7px; right: 9px;
  font-size: 12px; font-weight: 600; color: var(--text-2);
  display: flex; align-items: center; gap: 4px;
  opacity: .75; line-height: 1;
}
.card-clicks svg { width: 12px; height: 12px; opacity: .6; }

/* New badge */
.new-badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; line-height: 1;
  padding: 2px 6px; margin-left: 6px;
  border-radius: 4px; vertical-align: middle;
  background: rgba(52,211,153,.15); color: #34d399;
  animation: badgePulse 2s ease-in-out infinite;
}
@keyframes badgePulse {
  0%,100% { opacity: 1; }
  50% { opacity: .6; }
}

/* Team chip colors inside dropdown */
/* team chip color map */
[data-team="Sales"]     { --team-clr: #3b82f6; }
[data-team="CS"]        { --team-clr: #10b981; }
[data-team="Product"]   { --team-clr: #a855f7; }
[data-team="Marketing"] { --team-clr: #fb923c; --team-txt: #111; }
[data-team="People"]    { --team-clr: #ec4899; }
[data-team="Everyone"]  { --team-clr: #64748b; }
.type-chip[data-team] .chip-dot { background: var(--team-clr); }
.type-chip[data-team].active { background: var(--team-clr); color: var(--team-txt, #fff); }
.active-tag[data-team] { background: var(--team-clr); color: var(--team-txt, #fff); }
.card-arrow {
  width: 16px; height: 16px; flex-shrink: 0; margin-top: 3px;
  color: var(--muted); opacity: .25; transition: opacity .18s, transform .18s;
}
.link-card:hover .card-arrow,
.link-card:focus-within .card-arrow { opacity: 1; transform: translate(2px,-2px); }

/* ─── EMPTY STATE ────────────────────── */
.empty-state { text-align: center; padding: 60px 20px; display: none; }
.empty-state .emoji { font-size: 34px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; color: var(--muted); margin-bottom: var(--sp-4); }
.empty-clear-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: 100px;
  font-size: 13px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--accent); cursor: pointer; transition: all .2s;
}
.empty-clear-btn:hover { border-color: var(--accent); background: rgba(17,161,203,.08); }

/* ─── ANIMATIONS ─────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton-card {
  height: 88px; border-radius: var(--r);
  background: linear-gradient(90deg, var(--surface) 25%, var(--surf-h) 50%, var(--surface) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border: 1px solid var(--border);
}
.skeleton-quick {
  height: 52px; border-radius: var(--r);
  background: linear-gradient(90deg, var(--surface) 25%, var(--surf-h) 50%, var(--surface) 75%);
  background-size: 400px 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border: 1px solid var(--border);
}

/* ─── TOAST ──────────────────────────── */
.toast {
  position: fixed; bottom: var(--sp-6); left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(15,20,40,.95); border: 1px solid var(--bord-h);
  padding: 12px 22px; border-radius: 100px; font-size: 14px;
  backdrop-filter: blur(20px); z-index: 300;
  transition: transform .3s ease; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── HIGHLIGHT ──────────────────────── */
mark { background: rgba(17,161,203,.28); color: inherit; border-radius: 2px; padding: 0 1px; }

/* ─────────────────────────────────────── */
/* RESPONSIVE                              */
/* ─────────────────────────────────────── */

/* Tablet: 900px ── */
@media (max-width: 900px) {
  .quick-grid { grid-template-columns: repeat(3, 1fr); }
  .trending-grid { grid-template-columns: repeat(3, 1fr); }
  .fav-grid { grid-template-columns: repeat(3, 1fr); }
  .links-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
}

/* Tablet small / Mobile: 640px ── */
@media (max-width: 640px) {
  :root { --card-gap: 10px; --topbar-h: 56px; }

  /* Header */
  .topbar-inner { padding: 0 var(--sp-4); gap: var(--sp-3); height: var(--topbar-h); }
  .topbar-logo img { height: 17px; }
  .topbar-logo-text { display: none; }
  .topbar-logo-divider { display: none; }
  .btn-logout span { display: none; }
  .btn-logout { padding: 0 10px; }

  /* Search bar */
  .search-bar { padding: 10px 0; top: var(--topbar-h); }
  .search-bar-inner { padding: 0 var(--sp-4); }

  /* Main */
  .hub-main { padding: var(--sp-5) var(--sp-4) 64px; }

  /* Quick */
  .shortcuts-zone { padding: var(--sp-4) var(--sp-4) var(--sp-1); border-radius: var(--r); margin-bottom: var(--sp-5); }
  .quick-grid { grid-template-columns: repeat(3, 1fr); gap: var(--sp-2); }
  .trending-grid { grid-template-columns: repeat(2, 1fr); gap: var(--sp-2); }
  .fav-grid { grid-template-columns: repeat(2, 1fr); gap: var(--sp-2); }

  /* Filter bar mobile — hidden, replaced by mobile filter sheet */
  .filter-bar { display: none !important; }

  /* Touch feedback for collapsible headers */
  .cat-header:active { opacity: .7; }
  .section-label:active { opacity: .7; }

  /* Auto-hide controls bar on scroll down */
  .controls-bar { transition: transform .25s ease, opacity .2s ease; }
  .controls-bar.scroll-hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }

  /* Links grid */
  .links-grid { grid-template-columns: repeat(2, 1fr); }

  /* Cards */
  .link-card { padding: 12px; gap: 10px; }
  .card-icon { width: 32px; height: 32px; font-size: 15px; border-radius: 8px; margin-top: 0; }
  .card-title { font-size: 13px; }
  .card-desc  { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .card-arrow { width: 14px; height: 14px; margin-top: 1px; }

  /* Section headers */
  .cat-name { font-size: 16px; }
  .cat-header { margin-bottom: var(--sp-4); padding-bottom: var(--sp-3); }

  /* Login */
  .login-card { padding: var(--sp-8) var(--sp-6); }
}

/* Mobile small: 400px ── */
@media (max-width: 400px) {
  .quick-grid { grid-template-columns: repeat(2, 1fr); }
  .trending-grid { grid-template-columns: repeat(2, 1fr); }
  .fav-grid { grid-template-columns: repeat(2, 1fr); }
  .links-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="bg-mesh"></div>

<div id="app">

          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>

// ─── AUTH (fetch puro, zero CDN) ──────────────────────────────────────────

function sbHeaders() {

// Lê sessão do localStorage (Supabase salva com essa chave)
function getStoredSession() {
  try {

    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const session = parsed?.access_token ? parsed : null;
    if (!session) return null;
    // Retorna sessão mesmo se access_token expirou — refresh cuida disso
    return session;
  } catch { return null; }
}

function saveSession(session) {
  try {
    const key = 'sb-xqvsylwhthoslkyxvtex-auth-token';
    localStorage.setItem(key, JSON.stringify(session));
  } catch {}
}

function clearSession() {
  try {
    localStorage.removeItem('sb-xqvsylwhthoslkyxvtex-auth-token');
  } catch {}
}

// ─── TOKEN REFRESH (silent, runs every 10 min) ─────────────────────────

let _refreshTimer = null;

async function refreshSession() {
  try {
    const session = getStoredSession();
    if (!session?.refresh_token) return false;
    // Refresh if token expired OR expires within 15 minutes
    const now = Math.floor(Date.now() / 1000);
    if (session.expires_at && (session.expires_at - now) > 900) return true; // still valid
    const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: sbHeaders(),
      body: JSON.stringify({ refresh_token: session.refresh_token })
    });
    if (!res.ok) { clearSession(); return false; }
    const data = await res.json();
    if (data?.access_token) {
      data.expires_at = Math.floor(Date.now() / 1000) + (data.expires_in || 3600);
      data.user = session.user; // preserve user data
      saveSession(data);
      return true;
    }
    return false;
  } catch { return false; }
}

function startRefreshTimer() {
  if (_refreshTimer) return;
  _refreshTimer = setInterval(refreshSession, 10 * 60 * 1000); // every 10 min
}

async function signInWithGoogle() {
  window.location.href = `${SB_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(REDIRECT)}&hd=${DOMAIN}`;
}

async function exchangeCodeForSession(code) {
  const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=pkce`, {
    method: 'POST',
    headers: sbHeaders(),
    body: JSON.stringify({ auth_code: code, redirect_uri: REDIRECT })
  });
  if (!res.ok) return null;
  return await res.json();
}

async function handleCallback() {
  // OAuth callback: pode vir como ?code= (PKCE) ou #access_token= (implicit)
  const params = new URLSearchParams(window.location.search);
  const hash   = new URLSearchParams(window.location.hash.slice(1));

  // Implicit flow (Supabase default para OAuth)
  if (hash.get('access_token')) {
    const session = {
      access_token:  hash.get('access_token'),
      refresh_token: hash.get('refresh_token'),
      expires_at:    Math.floor(Date.now() / 1000) + parseInt(hash.get('expires_in') || '3600'),
      token_type:    hash.get('token_type'),
    };
    // Pega dados do usuário
    const userRes = await fetch(`${SB_URL}/auth/v1/user`, {
      headers: { ...sbHeaders(), 'Authorization': 'Bearer ' + session.access_token }
    });
    if (userRes.ok) {
      session.user = await userRes.json();
    }
    saveSession(session);
    // Limpa hash da URL
    history.replaceState(null, '', window.location.pathname);
    return session;
  }

  // PKCE flow
  if (params.get('code')) {
    const session = await exchangeCodeForSession(params.get('code'));
    if (session?.access_token) {
      saveSession(session);
      history.replaceState(null, '', window.location.pathname);
      return session;
    }
  }

  return null;
}

async function signOut() {
  const session = getStoredSession();
  if (session?.access_token) {
    fetch(`${SB_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Authorization': 'Bearer ' + session.access_token }
    }).catch(() => {});

  clearSession();
  showLogin();
}

  'cloud run': '☁️', 'whatspot': '📅',
};

function _slugify(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function buildTypesFromLinks() {
  // Collect unique descriptions across all loaded links
  const descMap = new Map(); // slug → { label, count }
  CATS.forEach(cat => cat.links.forEach(l => {
    const desc = (l.desc || '').trim();
    if (!desc) return;
    const slug = _slugify(desc);
    if (!descMap.has(slug)) {
      descMap.set(slug, { label: desc, count: 0 });
    }
    descMap.get(slug).count++;
  }));

  // Build TYPES array sorted by count (most used first), then alphabetically
  TYPES = Array.from(descMap.entries())
    .sort((a, b) => b[1].count - a[1].count || a[1].label.localeCompare(b[1].label))
    .map(([slug, { label }]) => ({
      id: slug,
      label,
      icon: _typeIcons[label.toLowerCase()] || '🔗',
    }));
}

function getTypeId(desc) {
  const d = (desc || '').trim();
  return d ? _slugify(d) : 'other';
}

  try {
    if (!_clickCountsLoaded) {
      const res = await fetch(SB_URL + '/rest/v1/rpc/get_link_click_counts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_ANON,
          'Authorization': 'Bearer ' + SB_ANON,
        },
        body: '{}'
      });
      if (!res.ok) return;
      const data = await res.json();
      _clickCounts = {};
      if (data?.length) {
        data.forEach(d => { const k = d.link_url.replace(/\/+$/, ''); _clickCounts[k] = (_clickCounts[k] || 0) + d.click_count; });
      }
      _clickCountsLoaded = true;
    }
    applyClickCounts();
  } catch (err) { /* silencioso */ }
}

function applyClickCounts() {
  if (!_clickCounts) return;
  // Link cards (div com <a.card-hit>), trending e quick (âncoras)
  document.querySelectorAll('.link-card, .trending-card[href], .quick-card[href]').forEach(card => {
    injectCount(card);
  });
}

// href do card: na âncora direta (quick/trending) ou no .card-hit interno (link-card)
function cardHref(card) {
  const el = card.matches('[href]') ? card : card.querySelector('.card-hit');
  return el ? el.getAttribute('href') : null;
}

function injectCount(card) {
  if (!_clickCounts) return;
  const href = cardHref(card);
  if (!href) return;
  const url = href.replace(/\/+$/, '');
  const count = _clickCounts[url];
  if (!count) return;
  if (card.querySelector('.card-clicks')) return;
  const el = document.createElement('div');
  el.className = 'card-clicks';
  el.title = count + (count === 1 ? ' clique' : ' cliques');
  el.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12 L7 3 L8.5 7 L14 7" stroke-linecap="round" stroke-linejoin="round"/><circle cx="14" cy="7" r="1.2" fill="currentColor" stroke="none"/></svg>${count}`;
  card.appendChild(el);
}

// ─── CLICK TRACKING ─────────────────────────────────────────────────────

function trackClick(url, title, linkId) {
  const payload = { link_url: url, link_title: title, user_email: window._userEmail || null };
  if (linkId != null && linkId !== '') payload.link_id = Number(linkId);
  const body = JSON.stringify(payload);
  fetch(SB_URL + '/rest/v1/link_clicks', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_ANON,
      'Authorization': 'Bearer ' + SB_ANON,
      'Prefer': 'return=minimal'
    },
    body
  }).catch(() => {});
}

function initClickTracking() {
  // Usa event delegation no hub-main para capturar todos os cliques em links
  const main = document.querySelector('.hub-main');
  if (!main || main._tracked) return;
  main._tracked = true;
  main.addEventListener('click', e => {
    // Estrela de favoritar: intercepta antes de navegar/trackear
    const favBtn = e.target.closest('.fav-btn');
    if (favBtn) {
      e.preventDefault();
      e.stopPropagation();
      toggleFavorite(favBtn.dataset.favId, favBtn);
      return;
    }
    const card = e.target.closest('.link-card, .quick-card, .trending-card, .fav-card');
    if (!card) return;
    const url = cardHref(card);
    const titleEl = card.querySelector('.card-title') || card.querySelector('span');
    const title = titleEl ? titleEl.textContent.trim() : '';
    const linkId = card.getAttribute('data-link-id');
    if (url && title) trackClick(url, title, linkId);
  });
}

// ─── TRENDING (mais acessados últimos 60 dias) ──────────────────────────

async function renderTrending() {
  const section = document.getElementById('trending-section');
  const grid = document.getElementById('trending-grid');
  try {
    // Query: top 6 links dos últimos 60 dias, agrupados por URL
    const since = new Date(Date.now() - 60 * 24 * 60 * 60 * 1000).toISOString();
    const res = await fetch(
      SB_URL + '/rest/v1/rpc/get_trending_links',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_ANON,
          'Authorization': 'Bearer ' + SB_ANON,
        },
        body: JSON.stringify({ since_date: since, max_results: 6 })
      }
    );
    if (!res.ok) throw new Error('Failed to fetch trending');
    const data = await res.json();
    if (!data || !data.length) {
      section.classList.add('no-data');
      return;
    }

    // Encontrar o link no CATS data (usado para ícone e id atual)
    function findLinkByUrl(url) {
      for (const cat of CATS) {
        const link = cat.links.find(l => l.url === url);
        if (link) return link;
      }
      return null;
    }

    // Merge trending counts into _clickCounts (authoritative source for trending period)
    if (!_clickCounts) _clickCounts = {};
    data.forEach(item => {
      const k = item.link_url.replace(/\/+$/, '');
      _clickCounts[k] = Math.max(_clickCounts[k] || 0, item.click_count);
    });

    grid.innerHTML = data.map((item, i) => {
      const link = findLinkByUrl(item.link_url);
      const icon = link ? link.icon : '🔗';
      const idAttr = link ? ` data-link-id="${link.id}"` : '';
      return `<a class="trending-card" href="${esc(item.link_url)}" target="_blank" rel="noopener"${idAttr}>
        <div class="ticon">${esc(icon)}</div>
        <span>${esc(item.link_title)}</span>
        <div class="trank">#${i + 1}</div>
      </a>`;
    }).join('');
    section.classList.remove('no-data');
    applyClickCounts();
  } catch (err) {
    console.warn('Trending not available:', err);
    section.classList.add('no-data');
  }
}

function renderQuick() {
  const items = _quickLinks.length > 0 ? _quickLinks : QUICK;
  document.getElementById('quick-grid').innerHTML = items.map(q => {
    const idAttr = q.id != null ? ` data-link-id="${q.id}"` : '';
    return `<a class="quick-card" href="${esc(q.url)}" target="_blank" rel="noopener"${idAttr}>
      <div class="qicon">${esc(q.icon)}</div>

}

// ─── FAVORITOS (curadoria por usuário: localStorage + Supabase) ──────────
// _favorites: array de link_id (number), ordenado do mais recente pro mais antigo.
var _favorites = [];
const FAV_KEY = 'hypr-hub-favs';
const FAV_STAR_SVG = '<svg viewBox="0 0 20 20" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M10 1.7l2.6 5.27 5.82.85-4.21 4.1.99 5.79L10 14.88l-5.2 2.73.99-5.79-4.21-4.1 5.82-.85z"/></svg>';

function isFav(id) { return _favorites.includes(Number(id)); }

// Botão-estrela para os cards do catálogo
function favStarBtn(id) {
  const on = isFav(id);
  return `<button type="button" class="fav-btn${on ? ' is-fav' : ''}" data-fav-id="${id}"`
    + ` aria-pressed="${on}" aria-label="${on ? 'Remover dos favoritos' : 'Adicionar aos favoritos'}"`
    + ` title="${on ? 'Remover dos favoritos' : 'Favoritar'}">${FAV_STAR_SVG}</button>`;
}

// Lookup id → link (varre o catálogo já carregado)
function findLinkById(id) {
  id = Number(id);
  for (const cat of CATS) {
    const l = cat.links.find(x => Number(x.id) === id);
    if (l) return l;
  }
  return null;
}

function loadFavoritesLocal() {
  try {
    const raw = localStorage.getItem(FAV_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    _favorites = Array.isArray(arr) ? arr.map(Number).filter(n => !isNaN(n)) : [];
  } catch { _favorites = []; }
}

function saveFavoritesLocal() {
  try { localStorage.setItem(FAV_KEY, JSON.stringify(_favorites)); } catch {}
}

function renderFavorites() {
  const section = document.getElementById('fav-section');
  const grid = document.getElementById('fav-grid');
  if (!section || !grid) return;
  const links = _favorites.map(findLinkById).filter(Boolean);
  if (!links.length) {
    grid.innerHTML = '';
    section.classList.add('no-data');
    return;
  }
  grid.innerHTML = links.map(l => `
    <div class="fav-card-wrap">
      <a class="fav-card" href="${esc(l.url)}" target="_blank" rel="noopener" data-link-id="${l.id}">
        <div class="qicon">${esc(l.icon)}</div>
        <span>${esc(l.title)}</span>
      </a>
      <button type="button" class="fav-btn is-fav" data-fav-id="${l.id}" aria-pressed="true" aria-label="Remover dos favoritos" title="Remover dos favoritos">${FAV_STAR_SVG}</button>
    </div>`).join('');
  section.classList.remove('no-data');
  applyClickCounts();
}

// Sincroniza os botões-estrela dos cards do catálogo com o estado atual
function syncStarButtons(id, on) {
  document.querySelectorAll('.link-card .fav-btn[data-fav-id="' + id + '"]').forEach(btn => {
    btn.classList.toggle('is-fav', on);
    btn.setAttribute('aria-pressed', String(on));
    btn.setAttribute('aria-label', on ? 'Remover dos favoritos' : 'Adicionar aos favoritos');
    btn.setAttribute('title', on ? 'Remover dos favoritos' : 'Favoritar');
    if (on) {
      btn.classList.remove('just-toggled');
      void btn.offsetWidth; // reflow → reinicia a animação
      btn.classList.add('just-toggled');
    }
  });
}

function toggleFavorite(id, sourceBtn) {
  id = Number(id);
  const wasFav = isFav(id);
  if (wasFav) _favorites = _favorites.filter(x => x !== id);
  else _favorites.unshift(id);
  saveFavoritesLocal();

  const paint = () => { renderFavorites(); syncStarButtons(id, !wasFav); };
  // View Transitions API: cross-fade suave da mudança de layout (degrada sozinho)
  if (document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.startViewTransition(paint);
  } else {
    paint();
  }
  persistFavorite(id, !wasFav);
}

// ─── SYNC COM SUPABASE (best-effort, exige sessão autenticada) ──────────
async function favAuthHeaders() {
  await refreshSession();
  const s = getStoredSession();
  const token = s?.access_token || SB_ANON;
  return { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}

async function persistFavorite(id, add) {
  const email = window._userEmail;
  if (!email) return; // sem login → fica só no localStorage
  try {
    const headers = await favAuthHeaders();
    if (add) {
      await fetch(SB_URL + '/rest/v1/hub_favorites', {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ user_email: email, link_id: id })
      });
    } else {
      await fetch(SB_URL + '/rest/v1/hub_favorites?user_email=eq.' + encodeURIComponent(email) + '&link_id=eq.' + id, {
        method: 'DELETE',
        headers
      });
    }
  } catch (err) {
    console.warn('Favorito não sincronizado (mantido localmente):', err);
  }
}

async function syncFavoritesFromDB() {
  const email = window._userEmail;
  if (!email) return;
  try {
    const headers = await favAuthHeaders();
    const res = await fetch(
      SB_URL + '/rest/v1/hub_favorites?user_email=eq.' + encodeURIComponent(email) + '&select=link_id,created_at&order=created_at.desc',
      { headers }
    );
    if (!res.ok) return;
    const rows = await res.json();
    const dbIds = rows.map(r => Number(r.link_id));
    const localOnly = _favorites.filter(id => !dbIds.includes(id));
    // União: DB (mais recentes primeiro) + favoritos locais que ainda não subiram
    const merged = [...dbIds];
    localOnly.forEach(id => { if (!merged.includes(id)) merged.push(id); });
    // Empurra os locais que faltam pro DB
    localOnly.forEach(id => persistFavorite(id, true));

    const changed = merged.length !== _favorites.length || merged.some((v, i) => v !== _favorites[i]);
    _favorites = merged;
    saveFavoritesLocal();
    if (changed) {
      renderFavorites();
      // Reaplica estado das estrelas nos cards já renderizados
      document.querySelectorAll('.link-card .fav-btn').forEach(btn => {
        const on = isFav(btn.dataset.favId);
        btn.classList.toggle('is-fav', on);
        btn.setAttribute('aria-pressed', String(on));
      });
    }
  } catch (err) {
    console.warn('Sync de favoritos indisponível:', err);
  }
}

function toggleFiltersDropdown() {

  if (!dd || !btn) return;

// Close panel on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('filters-wrap');
  if (wrap && !wrap.contains(e.target)) closeFiltersDropdown();
});

// Close panel/mobile sheet on Escape, Cmd/Ctrl+K to focus search
document.addEventListener('keydown', e => {
  // Cmd/Ctrl+K → focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const search = document.getElementById('search');
    if (search) { search.focus(); search.select(); }
    return;
  }
  if (e.key === 'Escape') {
    const dd = document.getElementById('filters-dropdown');
    if (dd?.classList.contains('open')) {
      closeFiltersDropdown();
      document.getElementById('filters-btn')?.focus();
      return;
    }
    if (document.getElementById('mf-sheet')?.classList.contains('open')) {
      closeMobileFilters();
    }
  }
});
