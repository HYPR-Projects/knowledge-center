// ─── MOBILE FILTER SHEET ────────────────────────────────────────────────

let _mfLastFocus = null;

function _mfFocusable() {
  const sheet = document.getElementById('mf-sheet');
  if (!sheet) return [];
  return [...sheet.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')]
    .filter(el => el.offsetParent !== null || el === document.activeElement);
}

function _mfTrap(e) {
  if (e.key !== 'Tab') return;
  const f = _mfFocusable();
  if (!f.length) return;
  const first = f[0], last = f[f.length - 1];
  if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
  else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
}

function openMobileFilters() {
  _mfLastFocus = document.activeElement;
  renderMobileChips();
  document.getElementById('mf-overlay').classList.add('open');
  const sheet = document.getElementById('mf-sheet');
  sheet.style.display = 'block';
  // Force reflow then animate
  sheet.offsetHeight;
  sheet.classList.add('open');
  document.body.style.overflow = 'hidden'; // prevent background scroll
  // Move focus into the dialog and trap Tab within it
  const f = _mfFocusable();
  if (f.length) f[0].focus();
  document.addEventListener('keydown', _mfTrap);
}

function closeMobileFilters() {
  document.getElementById('mf-overlay').classList.remove('open');
  const sheet = document.getElementById('mf-sheet');
  sheet.classList.remove('open');
  document.body.style.overflow = '';
  document.removeEventListener('keydown', _mfTrap);
  setTimeout(() => { if (!sheet.classList.contains('open')) sheet.style.display = 'none'; }, 300);
  // Restore focus to the element that opened the sheet
  if (_mfLastFocus && _mfLastFocus.focus) _mfLastFocus.focus();
  _mfLastFocus = null;
}

function renderMobileChips() {
  // Category
  const catEl = document.getElementById('mf-cat-chips');
  if (catEl) catEl.innerHTML = CATS.map(c =>
    `<button class="type-chip ${activeCats.has(c.id) ? 'active' : ''}" aria-pressed="${activeCats.has(c.id)}" data-cat="${c.id}" onclick="mfToggle('cat','${c.id}')"><span class="chip-dot"></span>${c.icon} ${c.label}</button>`
  ).join('');

  // Type — only used types
  const usedTypes = new Set();
  CATS.forEach(cat => cat.links.forEach(l => usedTypes.add(l._typeId)));
  const typeEl = document.getElementById('mf-type-chips');
  if (typeEl) typeEl.innerHTML = TYPES.filter(t => usedTypes.has(t.id)).map(t =>
    `<button class="type-chip ${activeTypes.has(t.id) ? 'active' : ''}" aria-pressed="${activeTypes.has(t.id)}" data-type="${t.id}" onclick="mfToggle('type','${t.id}')"><span class="chip-dot"></span>${t.icon} ${t.label}</button>`
  ).join('');

  // Team
  const teamEl = document.getElementById('mf-team-chips');
  if (teamEl) teamEl.innerHTML = TEAMS.map(t =>
    `<button class="type-chip ${activeTeams.has(t.id) ? 'active' : ''}" aria-pressed="${activeTeams.has(t.id)}" data-team="${t.id}" onclick="mfToggle('team','${t.id}')"><span class="chip-dot"></span>${t.label}</button>`
  ).join('');

  // Product
  const prodEl = document.getElementById('mf-prod-chips');
  if (prodEl) prodEl.innerHTML = PRODUCTS.map(p =>
    `<button class="type-chip ${activeProducts.has(p.id) ? 'active' : ''}" aria-pressed="${activeProducts.has(p.id)}" data-product="${p.id}" onclick="mfToggle('prod','${p.id}')"><span class="chip-dot"></span>${p.label}</button>`
  ).join('');

  updateMobileBadge();
}

function mfToggle(kind, id) {
  if (kind === 'cat') { toggleCat(id); }
  else if (kind === 'type') { toggleType(id); }
  else if (kind === 'team') { toggleTeam(id); }
  else if (kind === 'prod') { toggleProduct(id); }
  // Sync mobile chip active state in-place (fast, no full re-render)
  syncMobileChipState();
  updateMobileBadge();
}

function syncMobileChipState() {
  const sync = (sel, set, key) => document.querySelectorAll(sel).forEach(c => {
    const on = set.has(c.dataset[key]);
    c.classList.toggle('active', on);
    c.setAttribute('aria-pressed', on);
  });
  sync('#mf-cat-chips .type-chip', activeCats, 'cat');
  sync('#mf-type-chips .type-chip', activeTypes, 'type');
  sync('#mf-team-chips .type-chip', activeTeams, 'team');
  sync('#mf-prod-chips .type-chip', activeProducts, 'product');
}

function updateMobileBadge() {
  const total = activeCats.size + activeTypes.size + activeTeams.size + activeProducts.size;
  const badge = document.getElementById('mobile-filter-badge');
  const trigger = document.getElementById('mobile-filter-trigger');
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? '' : 'none';
  }
  if (trigger) trigger.classList.toggle('has-filter', total > 0);
  // Show/hide clear button
  const clr = document.getElementById('mf-clear');
  if (clr) clr.style.display = total > 0 ? '' : 'none';
}

function syncMobileFilters() {
  syncMobileChipState();
  updateMobileBadge();
}

function clearAllMobileFilters() {
  activeCats.clear(); activeTypes.clear(); activeTeams.clear(); activeProducts.clear();
  renderCatChips(); renderTypeChips(); renderTeamChips(); renderProductChips();
  updateCatBtn(); updateCatTags();
  updateTypeBtn(); updateActiveTags();
  updateTeamBtn(); updateTeamTags();
  updateProductBtn(); updateProductTags();
  renderMobileChips();
  renderSections();
}

// ─── CHIP RENDER & TOGGLE (per-filter) ──────────────────────────────────

function renderTeamChips() {
  document.getElementById('team-chips').innerHTML = TEAMS
    .map(t => `<button class="type-chip ${activeTeams.has(t.id) ? 'active' : ''}" aria-pressed="${activeTeams.has(t.id)}" data-team="${t.id}" onclick="toggleTeam('${t.id}')"><span class="chip-dot"></span>${t.label}</button>`)
    .join('');
}

function toggleTeam(id) {
  if (activeTeams.has(id)) activeTeams.delete(id);
  else activeTeams.add(id);
  document.querySelectorAll('#team-chips .type-chip').forEach(c => {
    const on = activeTeams.has(c.dataset.team);
    c.classList.toggle('active', on);
    c.setAttribute('aria-pressed', on);
  });
  updateTeamBtn(); updateTeamTags(); renderSections();
}

function renderProductChips() {
  document.getElementById('product-chips').innerHTML = PRODUCTS
    .map(p => `<button class="type-chip ${activeProducts.has(p.id) ? 'active' : ''}" aria-pressed="${activeProducts.has(p.id)}" data-product="${p.id}" onclick="toggleProduct('${p.id}')"><span class="chip-dot"></span>${p.label}</button>`)
    .join('');
}

function toggleProduct(id) {
  if (activeProducts.has(id)) activeProducts.delete(id);
  else activeProducts.add(id);
  document.querySelectorAll('#product-chips .type-chip').forEach(c => {
    const on = activeProducts.has(c.dataset.product);
    c.classList.toggle('active', on);
    c.setAttribute('aria-pressed', on);
  });
  updateProductBtn(); updateProductTags(); renderSections();
}

// ─── SECTIONS RENDER ─────────────────────────────────────────────────────

function renderSections() {
  const wrap = document.getElementById('sections');
  wrap.innerHTML = '';
  let total = 0;
  const q = searchQuery;

  // 1. Collect all links with their category info (for icon colors)
  let allLinks = [];
  CATS.forEach(cat => {
    cat.links.forEach(l => {
      allLinks.push({ ...l, _cat: cat });
    });
  });

  // 2. Apply global filters (search, type, team, product, category)
  if (q) {
    const tokens = _normalize(q).split(/\s+/).filter(Boolean);
    allLinks = allLinks.filter(l => {
      const hay = _buildHaystack(l);
      return tokens.every(t => hay.includes(t));
    });
    // Score & sort: title matches > desc/keyword > url/team/product
    allLinks.sort((a, b) => _searchScore(b, tokens) - _searchScore(a, tokens));
  }
  if (activeCats.size > 0) {
    allLinks = allLinks.filter(l => activeCats.has(l._cat.id));
  }
  if (activeTypes.size > 0) {
    allLinks = allLinks.filter(l => activeTypes.has(l._typeId));
  }
  if (activeTeams.size > 0) {
    allLinks = allLinks.filter(l => l.team && l.team.some(t => activeTeams.has(t)));
  }
  if (activeProducts.size > 0) {
    allLinks = allLinks.filter(l => l.product && l.product.some(p => activeProducts.has(p)));
  }

  // 3. Build groups based on active view mode
  let groups = []; // { id, label, icon, cls, links[] }

  if (activeViewMode === 'category') {
    CATS.forEach(cat => {
      const links = allLinks.filter(l => l._cat.id === cat.id);
      if (links.length) groups.push({ id: cat.id, label: cat.label, icon: cat.icon, cls: cat.cls, links });
    });
  }
  else if (activeViewMode === 'type') {
    TYPES.forEach(t => {
      const links = allLinks.filter(l => l._typeId === t.id);
      if (links.length) groups.push({ id: t.id, label: t.label, icon: t.icon, cls: 'grp-type', links });
    });
    // "Outros" = cards sem description (tipo não mapeado)
    const typeIds = new Set(TYPES.map(t => t.id));
    const noType = allLinks.filter(l => !typeIds.has(l._typeId));
    if (noType.length) groups.push({ id: '_other', label: 'Outros', icon: '🔗', cls: 'grp-other', links: noType });
  }
  else if (activeViewMode === 'team') {
    TEAMS.forEach(t => {
      const links = allLinks.filter(l => l.team && l.team.includes(t.id));
      if (links.length) groups.push({ id: t.id, label: t.label, icon: _teamIcon(t.id), cls: 'grp-' + t.id.toLowerCase(), links });
    });
    // "Outros" = cards sem team
    const noTeam = allLinks.filter(l => !l.team || l.team.length === 0);
    if (noTeam.length) groups.push({ id: '_other', label: 'Outros', icon: '📌', cls: 'grp-other', links: noTeam });
  }
  else if (activeViewMode === 'product') {
    PRODUCTS.forEach(p => {
      const links = allLinks.filter(l => l.product && l.product.includes(p.id));
      if (links.length) groups.push({ id: p.id, label: p.label, icon: _productIcon(p.id), cls: 'grp-prod', links });
    });
    // "Outros" = cards sem product
    const noProd = allLinks.filter(l => !l.product || l.product.length === 0);
    if (noProd.length) groups.push({ id: '_other', label: 'Outros', icon: '📌', cls: 'grp-other', links: noProd });
  }

  // 4. Render groups
  groups.forEach((grp, gi) => {
    total += grp.links.length;
    const sec = document.createElement('section');
    sec.className = 'cat-section';
    const grpKey = activeViewMode + '_' + grp.id;
    if (localStorage.getItem('hypr-hub-grp-' + grpKey) === '1') sec.classList.add('grp-collapsed');
    sec.dataset.cat = grp.id;
    sec.dataset.grpKey = grpKey;
    sec.style.animationDelay = `${0.1 + gi * 0.06}s`;
    const grpExpanded = !sec.classList.contains('grp-collapsed');
    sec.innerHTML = `
      <button type="button" class="cat-header" onclick="toggleGroup(this)" aria-expanded="${grpExpanded}">
        <span class="cat-icon ${grp.cls}" aria-hidden="true">${grp.icon}</span>
        <span class="cat-name">${grp.label}</span>
        <span class="cat-count">${grp.links.length}</span>
        <span class="grp-toggle" aria-hidden="true"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>
      <div class="grp-content"><div>
      <div class="links-grid">
        ${grp.links.map(l => {
          const typeId = l._typeId;
          const catCls = l._cat ? l._cat.cls : 'op';
          return `<div class="link-card" data-type="${typeId}" data-link-id="${l.id}">
            <a class="card-hit" href="${esc(l.url)}" target="_blank" rel="noopener" aria-label="${esc(l.title)}" title="${esc(l.title)}"></a>
            <div class="card-icon ${catCls}" aria-hidden="true">${esc(l.icon)}</div>
            <div class="card-body">
              <div class="card-title" title="${esc(l.title)}">${hl(l.title, q)}${l.isNew ? '<span class="new-badge">Novo</span>' : ''}</div>
              <div class="card-desc">${hl(l.desc, q)}</div>
              ${l.team && l.team.length ? `<div class="card-teams">${l.team.map(t => `<span class="team-tag t-${esc(t.toLowerCase())}">${esc(t)}</span>`).join('')}${l.product && l.product.length ? l.product.map(p => `<span class="product-tag p-${esc(p.toLowerCase())}">${esc(p)}</span>`).join('') : ''}</div>` : l.product && l.product.length ? `<div class="card-teams">${l.product.map(p => `<span class="product-tag p-${esc(p.toLowerCase())}">${esc(p)}</span>`).join('')}</div>` : ''}
            </div>
            ${favStarBtn(l.id)}
            <svg class="card-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M4 16L16 4M9 4h7v7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>`;
        }).join('')}
      </div>
      </div></div>`;
    wrap.appendChild(sec);
  });

  document.getElementById('empty-state').style.display = total === 0 ? 'block' : 'none';
  if (total === 0) {
    const msg = document.getElementById('empty-msg');
    const btn = document.getElementById('empty-clear-btn');
    const hasFilters = activeCats.size + activeTypes.size + activeTeams.size + activeProducts.size > 0;
    const hasSearch = !!searchQuery;
    if (hasSearch && hasFilters) {
      msg.textContent = 'Nenhum resultado para "' + document.getElementById('search').value.trim() + '" com os filtros ativos.';
      btn.style.display = '';
    } else if (hasSearch) {
      msg.textContent = 'Nenhum resultado para "' + document.getElementById('search').value.trim() + '".';
      btn.style.display = '';
    } else if (hasFilters) {
      msg.textContent = 'Nenhum link corresponde aos filtros selecionados.';
      btn.style.display = '';
    } else {
      msg.textContent = 'Nenhum resultado encontrado.';
      btn.style.display = 'none';
    }
  }
  // Só anuncia contagem via aria-live quando há busca/filtro ativo — evita
  // "N resultados" sendo lido no carregamento inicial e em renders passivos.
  const live = document.getElementById('results-live');
  const anyQuery = !!searchQuery || (activeCats.size + activeTypes.size + activeTeams.size + activeProducts.size) > 0;
  if (live) live.textContent = !anyQuery
    ? ''
    : (total === 0 ? 'Nenhum resultado' : total + (total === 1 ? ' resultado' : ' resultados'));
  applyClickCounts();
  updateToggleAllIcon();
}

// Helper icons for team/product group headers
function _teamIcon(id) {
  const map = { Sales: '💼', CS: '🎧', Product: '⚙️', Marketing: '📣', People: '💜', Everyone: '🌐' };
  return map[id] || '👥';
}
function _productIcon(id) {
  const map = { Groundflow: '🏪', RMND: '📊', O2O: '🔄', OOH: '📍' };
  return map[id] || '📦';
}

function _normalize(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function _buildHaystack(l) {
  return _normalize([l.title, l.desc, l.url, ...(l.team || []), ...(l.product || []), ...(l.keywords || [])].join(' '));
}

function _searchScore(l, tokens) {
  let score = 0;
  const title = _normalize(l.title);
  const desc  = _normalize(l.desc);
  const kws   = _normalize((l.keywords || []).join(' '));
  for (const t of tokens) {
    if (title.includes(t))  score += 10;
    if (desc.includes(t))   score += 3;
    if (kws.includes(t))    score += 5;
  }
  return score;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function hl(text, q) {
  if (!q) return text;
  const tokens = _normalize(q).split(/\s+/).filter(Boolean);
  if (!tokens.length) return text;
  // Build a map from normalized index → original index
  // We normalize char-by-char to keep alignment
  const chars = [...text]; // split into graphemes-ish (codepoints)
  const normChars = chars.map(c => c.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase());
  const norm = normChars.join('');
  // Build offset map: norm index → original char index
  const normToOrig = [];
  let oi = 0;
  for (let i = 0; i < normChars.length; i++) {
    for (let j = 0; j < normChars[i].length; j++) normToOrig.push(i);
    oi++;
  }
  normToOrig.push(chars.length); // sentinel
  // Find ranges on norm
  let ranges = [];
  for (const t of tokens) {
    let idx = 0;
    while ((idx = norm.indexOf(t, idx)) !== -1) {
      const origStart = normToOrig[idx];
      const origEnd = normToOrig[Math.min(idx + t.length, norm.length)];
      ranges.push([origStart, origEnd]);
      idx += t.length;
    }
  }
  if (!ranges.length) return text;
  // Merge overlapping
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (let i = 1; i < ranges.length; i++) {
    const last = merged[merged.length - 1];
    if (ranges[i][0] <= last[1]) last[1] = Math.max(last[1], ranges[i][1]);
    else merged.push(ranges[i]);
  }
  // Build result from original chars
  let result = '', prev = 0;
  for (const [s, e] of merged) {
    result += esc(chars.slice(prev, s).join('')) + '<mark>' + esc(chars.slice(s, e).join('')) + '</mark>';
    prev = e;
  }
  result += esc(chars.slice(prev).join(''));
  return result;
}

function initSearch() {
  const el = document.getElementById('search');
  if (el._listening) return; // idempotente
  el._listening = true;
  let t;
  el.addEventListener('input', e => {
    clearTimeout(t);
    t = setTimeout(() => {
      searchQuery = _normalize(e.target.value.trim());
      // Animate fav/quick/trending: hide during search, show when cleared
      document.getElementById('fav-section').classList.toggle('search-hidden', !!searchQuery);
      document.getElementById('quick-section').classList.toggle('search-hidden', !!searchQuery);
      document.getElementById('trending-section').classList.toggle('search-hidden', !!searchQuery);
      renderSections();
    }, 120);
  });
}

function clearAllFiltersAndSearch() {
  document.getElementById('search').value = '';
  searchQuery = '';
  activeCats.clear(); activeTypes.clear(); activeTeams.clear(); activeProducts.clear();
  renderCatChips(); renderTypeChips(); renderTeamChips(); renderProductChips();
  updateCatBtn(); updateCatTags();
  updateTypeBtn(); updateActiveTags();
  updateTeamBtn(); updateTeamTags();
  updateProductBtn(); updateProductTags();
  syncMobileFilters();
  document.getElementById('fav-section').classList.remove('search-hidden');
  document.getElementById('quick-section').classList.remove('search-hidden');
  document.getElementById('trending-section').classList.remove('search-hidden');
  renderSections();
}

// ─── BOOT ─────────────────────────────────────────────────────────────────

document.getElementById('btn-google').addEventListener('click', signInWithGoogle);
document.getElementById('btn-logout').addEventListener('click', signOut);

// Recalc slider on resize
window.addEventListener('resize', () => updateViewSlider(true));

// Auto-hide controls bar on scroll down (mobile viewport saver)
(function() {
  let lastY = 0;
  const mq = window.matchMedia('(max-width: 640px)');
  window.addEventListener('scroll', () => {
    if (!mq.matches) return;
    const bar = document.getElementById('controls-bar');
    if (!bar) return;
    const y = window.scrollY;
    if (y > lastY && y > 120) bar.classList.add('scroll-hidden');
    else bar.classList.remove('scroll-hidden');
    lastY = y;
  }, { passive: true });
})();

(async () => {
  try {
    // 1. Tenta pegar sessão do callback OAuth (hash ou code)
    const cbSession = await handleCallback();
    if (cbSession) { hideLoading(); await showHub(cbSession); return; }

    // 2. Tenta sessão salva no localStorage
    const stored = getStoredSession();
    if (stored) {
      // Se access_token expirou, tenta refresh silencioso antes de mostrar o hub
      const now = Math.floor(Date.now() / 1000);
      if (stored.expires_at && stored.expires_at < now) {
        const refreshed = await refreshSession();
        if (refreshed) {
          const fresh = getStoredSession();
          hideLoading(); await showHub(fresh); return;
        }
        // Refresh falhou — refresh token expirado, precisa logar de novo
        clearSession();
        hideLoading(); showLogin(); return;
      }
      hideLoading(); await showHub(stored); return;
    }

    // 3. Sem sessão: mostra login
    hideLoading();
    showLogin();
  } catch (err) {
    console.error(err);
    hideLoading();
    showLogin();
  }
})();
</script>
